title: "[配置分享] 请在这里写上你的配置名称"
labels: ["配置分享", "Show and tell"]
body:
  - type: markdown
    attributes:
      value: "🎉 感谢分享！请简单介绍一下你对角色及其定位的理解，并附上配置文件供大家下载体验。"
  - type: textarea
    id: idea
    attributes:
      label: 💡 标签设计思路
      description: 你新增/修改了哪些角色标签？有哪些独到的见解？
      placeholder: "我新增了标签A、B、C，为角色X、Y、Z添加标签A，因为……"
    validations:
      required: true
  - type: textarea
    id: config_code
    attributes:
      label: "📋 配置码"
      description: "请粘贴从应用中导出的配置码（点击导出按钮自动复制到剪贴板）"
    validations:
      required: true